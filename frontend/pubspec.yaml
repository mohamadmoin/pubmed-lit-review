name: litreview_app
description: Flutter client for PubMed AI literature review generation.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^5.1.0
  http: ^1.3.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  open_file: ^3.3.2
  file_picker: ^6.1.1
  url_launcher: ^6.2.5
  glass_kit: ^3.0.0
  flutter_animate: ^4.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700
